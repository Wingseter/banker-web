name: CI

on:
  push:
    branches: [master, refactor]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: bank
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -prootpass --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      NODE_ENV: test
      SESSION_SECRET: ci-only-secret-do-not-use-in-prod
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: bank

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -P 3307 -uroot -prootpass --silent && break
            sleep 2
          done

      - name: Apply schema
        run: mysql -h 127.0.0.1 -P 3307 -uroot -prootpass < db/init.sql

      - name: Test
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: banker-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
